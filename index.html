<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>한글 꼬들 — 두 글자 단어 맞히기</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --text: #e8eaed;
    --muted: #9aa0ac;
    --border: #2c3040;
    --correct: #4f9d69;   /* 자리·글자 모두 정답 */
    --present: #c9a227;   /* 글자 맞음, 자리 틀림 */
    --absent: #3a3f4c;    /* 없는 글자 */
    --accent: #6c8cff;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: "Pretendard", -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* #app is sized at a comfortable fixed scale, then JS shrinks it
     proportionally (transform: scale) so it always fits the viewport. */
  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  h1 { font-size: 22px; margin: 0 0 2px; letter-spacing: -0.02em; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .syll {
    width: 84px;
    height: 84px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    font-weight: 700;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--panel);
    position: relative;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  /* 자모 단위 하단 힌트 바: 초·중·종 3칸 */
  .jamo-hint {
    position: absolute;
    bottom: 4px;
    left: 4px;
    right: 4px;
    height: 6px;
    display: flex;
    gap: 3px;
  }
  .jamo-hint span { flex: 1; border-radius: 3px; background: transparent; }
  .syll.correct { background: var(--correct); border-color: var(--correct); }
  .syll.present { background: var(--present); border-color: var(--present); }
  .syll.absent  { background: var(--absent);  border-color: var(--absent); }
  .syll.pop { transform: scale(1.08); }

  .jc-correct { background: var(--correct) !important; }
  .jc-present { background: var(--present) !important; }
  .jc-absent  { background: rgba(255,255,255,0.18) !important; }

  #controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: calc(2 * 84px + 10px);
  }
  #guess {
    width: 100%;
    font-size: 18px;
    text-align: center;
    padding: 8px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--panel);
    color: var(--text);
    outline: none;
  }
  #guess:focus { border-color: var(--accent); }
  button {
    width: 100%;
    font-size: 16px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
  }
  button:active { transform: translateY(1px); }

  #msg { min-height: 24px; margin-top: 16px; font-size: 15px; font-weight: 600; }
  #msg.win { color: var(--correct); }
  #msg.lose { color: #e0697a; }
  #msg.warn { color: var(--present); }

  .legend { margin-top: 18px; color: var(--muted); font-size: 12px; line-height: 1.5; text-align: center; }
  .legend b.c { color: var(--correct); }
  .legend b.p { color: var(--present); }
  #newGame { background: transparent; border: 1px solid var(--border); color: var(--muted); margin-top: 14px; }
</style>
</head>
<body>
  <div id="app">
    <h1>한글 꼬들</h1>
    <div class="sub">두 글자 단어를 6번 안에 맞혀보세요</div>

    <div id="board"></div>

    <div id="controls">
      <input id="guess" maxlength="2" autocomplete="off" placeholder="" />
      <button id="submit">입력</button>
    </div>

    <div id="msg"></div>

    <div class="legend">
      <b class="c">초록</b> 글자·자리 정답 &nbsp;·&nbsp; <b class="p">노랑</b> 단어에 있지만 자리 틀림 &nbsp;·&nbsp; 회색 없음<br>
      글자 칸 아래 작은 바는 <b>초성·중성·종성</b> 각각의 힌트입니다.
    </div>
    <button id="newGame">새 게임</button>
  </div>

<script>
(function () {
  "use strict";

  // 두 글자 한글 단어 풀
  const WORDS = [
    "가방","책상","의자","창문","거울","침대","베개","이불","수건","비누",
    "치약","칫솔","우산","장갑","모자","안경","지갑","신발","양말","벨트",
    "시계","반지","팔찌","가위","물감","사과","포도","딸기","수박","참외",
    "당근","양파","감자","고추","마늘","오이","호박","버섯","상추","깻잎",
    "사자","토끼","여우","늑대","사슴","기린","하마","악어","거북","참새",
    "까치","제비","상어","고래","문어","새우","학교","교실","식당","매점",
    "복도","계단","공책","연필","필통","병원","약국","은행","시장","마트",
    "식품","의사","경찰","김치","라면","과자","사탕","우유","주스","커피",
    "콜라","하늘","바다","호수","구름","태양","바람","여름","가을","겨울",
    "가족","아빠","엄마","누나","언니","동생","친구","사랑","행복","기쁨",
    "슬픔","음악","미술","체육","과학","역사","수학","국어","영어","노래",
    "그림","사진","영화","공원","운동","축구","야구","농구","배구","탁구",
    "그릇","접시","바닥","천장","회사","직장","지폐","동전","통장","편지",
    "엽서","소포","택배","공항","여행","호텔","바지","치마","셔츠","외투",
    "잠옷","거실","주방","침실","화분","나무","뿌리","달력","알람","지구",
    "우주","행성","바퀴","핸들","신문","잡지","소설","극장","무대","공연",
    "시험","숙제","바늘","단추","물병","열쇠","연못","폭포","산책","등산",
    "낚시","캠핑","버스","트럭","기차"
  ];

  const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  const JUNG = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
  const JONG = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

  // 한 음절을 [초성, 중성, 종성] 자모로 분해 (종성 없으면 "")
  function decompose(ch) {
    const code = ch.charCodeAt(0) - 0xAC00;
    if (code < 0 || code > 11171) return null; // 완성형 한글이 아님
    const cho = Math.floor(code / (21 * 28));
    const jung = Math.floor((code % (21 * 28)) / 28);
    const jong = code % 28;
    return [CHO[cho], JUNG[jung], JONG[jong]];
  }

  const MAX_ROWS = 6;
  const WORD_LEN = 2;
  let answer = "";
  let answerJamo = [];   // [[초,중,종], [초,중,종]]
  let currentRow = 0;
  let over = false;

  const boardEl = document.getElementById("board");
  const inputEl = document.getElementById("guess");
  const msgEl = document.getElementById("msg");

  function buildBoard() {
    boardEl.innerHTML = "";
    for (let r = 0; r < MAX_ROWS; r++) {
      const row = document.createElement("div");
      row.className = "row";
      for (let c = 0; c < WORD_LEN; c++) {
        const cell = document.createElement("div");
        cell.className = "syll";
        const hint = document.createElement("div");
        hint.className = "jamo-hint";
        for (let j = 0; j < 3; j++) hint.appendChild(document.createElement("span"));
        cell.appendChild(hint);
        row.appendChild(cell);
      }
      boardEl.appendChild(row);
    }
  }

  function newGame() {
    answer = WORDS[Math.floor(Math.random() * WORDS.length)];
    answerJamo = [...answer].map(decompose);
    currentRow = 0;
    over = false;
    buildBoard();
    setMsg("", "");
    inputEl.value = "";
    inputEl.disabled = false;
    let example = answer;
    while (example === answer) example = WORDS[Math.floor(Math.random() * WORDS.length)];
    inputEl.placeholder = `예: ${example}`;
    inputEl.focus();
  }

  function setMsg(text, cls) {
    msgEl.textContent = text;
    msgEl.className = cls || "";
  }

  // 음절 단위 색 (전체 글자 일치 기준) — Wordle 본판 규칙
  function scoreSyllables(guess) {
    const result = new Array(WORD_LEN).fill("absent");
    const ansChars = [...answer];
    const used = new Array(WORD_LEN).fill(false);
    // 1차: 정확히 같은 자리
    for (let i = 0; i < WORD_LEN; i++) {
      if (guess[i] === ansChars[i]) { result[i] = "correct"; used[i] = true; }
    }
    // 2차: 다른 자리에 존재
    for (let i = 0; i < WORD_LEN; i++) {
      if (result[i] === "correct") continue;
      for (let k = 0; k < WORD_LEN; k++) {
        if (!used[k] && guess[i] === ansChars[k]) { result[i] = "present"; used[k] = true; break; }
      }
    }
    return result;
  }

  // 자모 단위 색 — 각 음절의 초/중/종을 같은 자리 정답과 비교
  function scoreJamo(guessSyll, ansSyll) {
    // guessSyll, ansSyll: [초,중,종]
    const flatAns = answerJamo.flat().filter(Boolean);
    return guessSyll.map((g, idx) => {
      if (!g) return "none";
      if (g === ansSyll[idx]) return "jc-correct";
      if (flatAns.includes(g)) return "jc-present";
      return "jc-absent";
    });
  }

  function submitGuess() {
    if (over) return;
    const raw = inputEl.value.trim();
    if (raw.length !== WORD_LEN) { setMsg("두 글자를 입력하세요.", "warn"); return; }
    const jamo = [...raw].map(decompose);
    if (jamo.some(j => j === null)) { setMsg("완성된 한글 두 글자만 가능해요.", "warn"); return; }

    const guessChars = [...raw];
    const syllScore = scoreSyllables(guessChars);
    const rowEl = boardEl.children[currentRow];

    guessChars.forEach((ch, i) => {
      const cell = rowEl.children[i];
      // 글자 표시
      cell.insertBefore(document.createTextNode(ch), cell.firstChild);
      setTimeout(() => {
        cell.classList.add(syllScore[i], "pop");
        setTimeout(() => cell.classList.remove("pop"), 150);
        // 자모 힌트 색칠
        const jScore = scoreJamo(jamo[i], answerJamo[i]);
        const bars = cell.querySelector(".jamo-hint").children;
        jScore.forEach((cls, k) => { if (cls !== "none") bars[k].classList.add(cls); });
      }, i * 250);
    });

    inputEl.value = "";

    if (raw === answer) {
      over = true;
      inputEl.disabled = true;
      const tries = currentRow + 1;
      setTimeout(() => setMsg(`정답! ${tries}번 만에 맞혔어요 🎉`, "win"), WORD_LEN * 250 + 100);
      return;
    }

    currentRow++;
    if (currentRow >= MAX_ROWS) {
      over = true;
      inputEl.disabled = true;
      setTimeout(() => setMsg(`아쉬워요. 정답은 "${answer}" 였습니다.`, "lose"), WORD_LEN * 250 + 100);
    } else {
      setMsg("", "");
    }
  }

  document.getElementById("submit").addEventListener("click", submitGuess);
  document.getElementById("newGame").addEventListener("click", newGame);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); submitGuess(); }
  });

  newGame();

  // 화면 높이/너비에 맞춰 전체 UI를 같은 비율로 축소해 한 화면에 항상 다 보이게 함
  const appEl = document.getElementById("app");
  function fitToScreen() {
    appEl.style.transform = "scale(1)";
    const scale = Math.min(
      1,
      window.innerWidth / appEl.scrollWidth,
      window.innerHeight / appEl.scrollHeight
    );
    appEl.style.transform = `scale(${scale})`;
  }
  window.addEventListener("resize", fitToScreen);
  window.addEventListener("orientationchange", fitToScreen);
  fitToScreen();
})();
</script>
</body>
</html>
